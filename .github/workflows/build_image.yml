name: Build Image

on:
  workflow_dispatch:

env:
  IMAGE_REPOSITORY: kejahunt
  IMAGE_TAG: property

jobs:
  build:
    name: Build and Push .NET API Container
    runs-on: ubuntu-latest

    steps:
      - name: Checkout API Source
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and Push Runtime Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          target: runtime
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_REPOSITORY }}:${{ env.IMAGE_TAG }}

      - name: Build and Push Migration Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          target: migrations
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_REPOSITORY }}:property-migrations